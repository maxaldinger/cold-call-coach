<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2230" />
      <stop offset="1" stop-color="#0b0f17" />
    </linearGradient>
    <radialGradient id="glow" cx="0.47" cy="0.46" r="0.5">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.4" />
      <stop offset="1" stop-color="#34d399" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg)" />
  <circle cx="480" cy="470" r="350" fill="url(#glow)" />

  <!-- the phone he's holding up to his face — drawn first, gripped from in front below -->
  <g transform="translate(792,452) rotate(17)">
    <rect x="-72" y="-145" width="144" height="290" rx="32" fill="#eef2f7" stroke="#c2ccd8" stroke-width="5" />
    <rect x="-53" y="-120" width="106" height="240" rx="18" fill="#0f3b30" />
    <rect x="-18" y="-134" width="36" height="7" rx="3.5" fill="#c2ccd8" />
    <g fill="#34d399">
      <rect x="-45" y="-12" width="13" height="24" rx="6.5" />
      <rect x="-25" y="-30" width="13" height="60" rx="6.5" />
      <rect x="-5" y="-44" width="13" height="88" rx="6.5" />
      <rect x="15" y="-30" width="13" height="60" rx="6.5" />
      <rect x="35" y="-12" width="13" height="24" rx="6.5" />
    </g>
  </g>

  <!-- the little guy — big, centered, wearing shades -->
  <g transform="translate(144,140) scale(14)">
    <path d="M24 5 C34 5 42 12 42 23 C42 34.5 35.5 44 24 44 C12.5 44 6 34.5 6 23 C6 12 14 5 24 5 Z" fill="#5eeab0" />
    <ellipse cx="24" cy="33" rx="15" ry="11" fill="#23c98e" opacity="0.25" />
    <ellipse cx="18" cy="13" rx="11" ry="8" fill="#ffffff" opacity="0.14" />
    <ellipse cx="12.5" cy="30" rx="3.1" ry="2" fill="#fb7185" opacity="0.55" />
    <ellipse cx="35.5" cy="30" rx="3.1" ry="2" fill="#fb7185" opacity="0.55" />

    <!-- Ray-Ban wayfarers -->
    <rect x="7" y="16" width="4.6" height="2.6" rx="1" fill="#111418" />
    <rect x="36.4" y="16" width="4.6" height="2.6" rx="1" fill="#111418" />
    <rect x="10.6" y="15.3" width="26.8" height="3" rx="1.4" fill="#111418" />
    <rect x="22" y="17.6" width="4" height="1.9" rx="0.9" fill="#111418" />
    <rect x="11.2" y="16.6" width="11" height="8.4" rx="2.6" fill="#1b1f27" />
    <rect x="25.8" y="16.6" width="11" height="8.4" rx="2.6" fill="#1b1f27" />
    <path d="M13 23.6 L17 17.6 L18.6 17.6 L14.6 23.6 Z" fill="#ffffff" opacity="0.18" />
    <path d="M27.6 23.6 L31.6 17.6 L33.2 17.6 L29.2 23.6 Z" fill="#ffffff" opacity="0.18" />

    <!-- confident grin -->
    <path d="M16.5 30 Q24 40.5 31.5 30 Z" fill="#7a2933" />
    <path d="M19.6 35 Q24 39.6 28.4 35 Z" fill="#fb7185" />
  </g>

  <!-- little hand gripping the phone -->
  <ellipse cx="724" cy="566" rx="30" ry="24" transform="rotate(17 724 566)" fill="#5eeab0" />
</svg>
